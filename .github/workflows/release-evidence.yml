name: Release Evidence

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to record. Defaults to package.json or the tag name.
        required: false
      since:
        description: Previous tag or git ref for the release range. Defaults to the previous v* tag.
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Test
        run: npm test

      - name: Validate examples and process docs
        run: node bin/dossier.mjs validate examples/*.dossier.json docs/product/process-dossiers/process-dossiers-scope.dossier.json

      - name: Build examples and process docs
        run: node bin/dossier.mjs build examples/*.dossier.json docs/product/process-dossiers/process-dossiers-scope.dossier.json

      - name: Package dry run
        run: npm pack --dry-run --json > npm-pack-dry-run.json

      - name: Resolve release inputs
        id: release
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi
          SINCE="${{ github.event.inputs.since }}"
          if [ -z "$SINCE" ]; then
            SINCE="$(git describe --tags --abbrev=0 --match 'v*' HEAD^ 2>/dev/null || true)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"

      - name: Collect release evidence
        run: >
          node bin/dossier.mjs release collect
          --version "${{ steps.release.outputs.version }}"
          --since "${{ steps.release.outputs.since }}"
          --out "docs/releases/${{ steps.release.outputs.version }}.dossier.json"
          --checks "npm test,node bin/dossier.mjs validate examples/*.dossier.json docs/product/process-dossiers/process-dossiers-scope.dossier.json,node bin/dossier.mjs build examples/*.dossier.json docs/product/process-dossiers/process-dossiers-scope.dossier.json,npm pack --dry-run --json"

      - name: Upload release evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-evidence-${{ steps.release.outputs.version }}
          path: |
            docs/releases/${{ steps.release.outputs.version }}.dossier.json
            docs/releases/release-*.html
            docs/releases/release-*.md
            npm-pack-dry-run.json
