name: CI

on:
  push:
    branches: [next, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm test
      - name: Validate examples and process docs
        run: node bin/dossier.mjs validate examples/*.dossier.json docs/product/process-dossiers/process-dossiers-scope.dossier.json
      - name: Build examples and process docs
        run: node bin/dossier.mjs build examples/*.dossier.json docs/product/process-dossiers/process-dossiers-scope.dossier.json
      - name: Build example workspace index
        run: node bin/dossier.mjs workspace index examples
      - name: Package dry run
        run: npm pack --dry-run --json

  react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Typecheck the React port
        run: cd react && npm ci && npx tsc --noEmit
